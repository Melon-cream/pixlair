name: Release Binary

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/release.yml"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Prepare asset
        run: cp target/release/pixlair pixlair-linux-x86_64

      - name: Update rolling tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f rolling "${GITHUB_SHA}"
          git push origin refs/tags/rolling --force

      - name: Upload release asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: pixlair-linux-x86_64
          asset_name: pixlair-linux-x86_64
          tag: rolling
          release_name: Rolling Release
          body: Latest binary built from the main branch.
          overwrite: true
          make_latest: false
